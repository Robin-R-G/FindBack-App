name: find_back
description: Smart Lost & Found System using QR Code
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^12.1.1
  http: ^1.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2
  url_launcher: ^6.2.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0 # For modern typography
  screenshot: ^3.0.0
  gal: ^2.3.1
  path_provider: ^2.1.2
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/app_logo.png
