services:
  - type: web
    name: findback
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: findback-db
          property: connectionString

databases:
  - name: findback-db
    plan: free
    databaseName: findback
